<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passageiros · Expresso Unir</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--or:#E8711A;--az:#2D2F8F;--azL:#EEEEF8;--bg:#F4F4F6;--bd:#E2E2EA;--tx:#1A1D2E;--t2:#4A5068;--t3:#9198B4;--hub-dark:#2D2F8F;--hub-or:#E8711A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh}
header{background:var(--hub-dark);border-bottom:3px solid var(--hub-or);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(45,47,143,.4)}
.logo{display:flex;align-items:center;gap:14px}
.logo-divider{width:1px;height:28px;background:rgba(255,255,255,.25)}
.logo h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
.logo p{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px;letter-spacing:.3px}
.mbadge{background:var(--hub-or);color:#fff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:.3px}
nav{background:var(--hub-dark);border-bottom:1px solid rgba(255,255,255,.1);padding:0 40px;display:flex;overflow-x:auto}
nav button{padding:13px 18px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.5);cursor:pointer;font:500 12px 'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
nav button:hover{color:rgba(255,255,255,.85)}
nav button.active{color:#fff;border-bottom-color:var(--hub-or);font-weight:600}
.msel{background:var(--hub-dark);border-bottom:1px solid rgba(255,255,255,.08);padding:8px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.msel span{font-size:10px;color:rgba(255,255,255,.45);font-weight:600;margin-right:2px;letter-spacing:.5px;text-transform:uppercase}
.mb{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);font:500 11px 'Outfit',sans-serif;cursor:pointer;transition:all .15s}
.mb:hover{background:rgba(255,255,255,.1);color:#fff}
.mb.active{background:var(--hub-or);color:#fff;border-color:var(--hub-or)}
main{padding:24px 40px}
.tp{display:none}.tp.active{display:block}
.st{font-size:11px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--hub-dark)}
.st::before{content:'';width:3px;height:14px;background:var(--hub-or);border-radius:2px;flex-shrink:0}
.st::after{content:'';flex:1;height:1px;background:var(--bd)}
.pw{overflow-x:auto;background:#fff;border:1px solid var(--bd);border-radius:12px;margin-bottom:24px;box-shadow:0 1px 4px rgba(45,47,143,.06)}
table{border-collapse:collapse;min-width:100%}
td.lbl{font-size:10px;font-weight:600;color:var(--t2);padding:6px 14px;text-align:left;position:sticky;left:0;z-index:2;background:#fff;border-right:2px solid var(--bd);white-space:nowrap;min-width:160px}
tr.rg td{background:var(--hub-dark);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px}
tr.rg td.lbl{background:var(--hub-dark);color:#fff;border-right-color:rgba(255,255,255,.15)}
tr.rsub td{background:#3D3F9E;color:rgba(255,255,255,.75);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:5px 14px;text-align:center}
tr.rsub td.lbl{background:#3D3F9E;color:#fff;text-align:left}
tr.rwd td{background:#F7F8FC;color:var(--t3);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;text-align:center;border-bottom:1px solid var(--bd)}
tr.rwd td.lbl{background:#F7F8FC;color:var(--t3);font-size:9px}
tr.rdt td{background:#F0F1F7;color:var(--t2);font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:5px 10px;text-align:center;border-bottom:2px solid var(--bd)}
tr.rdt td.lbl{background:#F0F1F7;font-family:'Outfit',sans-serif;font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;font-weight:600}
tr.rd td{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);padding:6px 10px;text-align:center;border-bottom:1px solid #F3F4F8;min-width:50px}
tr.rd td.lbl{font-family:'Outfit',sans-serif}
tr.rtot td{background:#F8F8FB;font-weight:700;color:var(--tx)}
tr.rtot td.lbl{background:#F8F8FB}
tr.rviag td{color:var(--t3);font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;text-align:center;border-bottom:1px solid #F3F4F8}
tr.rviag td.lbl{font-family:'Outfit',sans-serif;color:var(--t2)}
tr.rpct td{background:#F5F3FF;font-family:'DM Mono',monospace;font-size:10px;color:#7C3AED;padding:5px 10px;text-align:center;border-bottom:1px solid #EDE9FE}
tr.rpct td.lbl{background:#F5F3FF;font-family:'Outfit',sans-serif;font-size:10px;color:#7C3AED;font-weight:600}
tr.rgtot td{background:var(--azL);font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--az);padding:7px 10px;text-align:center;border-top:2px solid var(--bd);border-bottom:2px solid var(--bd)}
tr.rgtot td.lbl{background:var(--azL);font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;color:var(--az);letter-spacing:.5px;text-transform:uppercase}
tr.rgtotpct td{background:#EDE9FE;font-family:'DM Mono',monospace;font-size:10px;color:#7C3AED;padding:5px 10px;text-align:center;border-bottom:3px solid var(--bd)}
tr.rgtotpct td.lbl{background:#EDE9FE;font-family:'Outfit',sans-serif;font-size:10px;color:#7C3AED;font-weight:600}
tr.robs td{background:#fff;font-size:9px;font-weight:600;padding:4px 10px;text-align:center;border-bottom:3px solid var(--bd);color:transparent;white-space:nowrap;max-width:64px;overflow:hidden;text-overflow:ellipsis}
tr.robs td.lbl{background:#FFFBEB;font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:#92400E}
tr.robs td.o-fer{background:#FFFBEB;color:#92400E}
td.ctot{font-weight:700;color:var(--hub-dark);background:#F0F1F7 !important;border-left:2px solid var(--bd)}
tr.rg     td.ctot{background:var(--hub-dark)!important;border-left-color:rgba(255,255,255,.15)}
tr.rsub   td.ctot{background:#3D3F9E!important;border-left-color:rgba(255,255,255,.15)}
tr.rwd    td.ctot{background:#F0F1F7!important;font-size:9px;color:var(--az)}
tr.rdt    td.ctot{background:#E8EAF6!important}
tr.rviag  td.ctot{background:#F0F1F7!important;color:var(--t3);font-weight:400}
tr.rpct   td.ctot{background:#EDE9FE!important;color:#7C3AED}
tr.rgtot  td.ctot{background:#D8DBF5!important;color:var(--az)}
tr.rgtotpct td.ctot{background:#DDD9F7!important;color:#7C3AED}
tr.robs   td.ctot{background:#FEF3C7!important;color:transparent}
td.csab{background:#FFF8F2!important}
td.cdom{background:#FFF2F2!important}
td.cfer{background:#FFFBEB!important}
td.cnul{color:var(--bd)!important;font-weight:400!important}
tr.rsep td{height:10px;background:var(--bg)}
footer{text-align:center;padding:18px 40px;font-size:10px;color:rgba(255,255,255,.4);border-top:1px solid rgba(255,255,255,.1);background:var(--hub-dark);margin-top:24px;letter-spacing:.5px}
@media(max-width:768px){header,main,nav,.msel,footer{padding-left:14px;padding-right:14px}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.tooltip{position:absolute;background:#1A1D2E;color:#fff;font-size:11px;font-family:'Outfit',sans-serif;padding:5px 10px;border-radius:6px;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.3);display:none}
</style>
</head>

const GRUPOS=['MUNICIPAL VESPASIANO','MUNICIPAL','DER','EXECUTIVO','SEMI-EXPRESSO','CONVENCIONAL'];
const GRUPOS_FULL=new Set(['MUNICIPAL VESPASIANO','MUNICIPAL','DER']);
const MONTHS=['Jan26','Fev26','Mar26','Abr26','Mai26'];
const MONTH_LBL={Jan26:'Janeiro',Fev26:'Fevereiro',Mar26:'Março',Abr26:'Abril',Mai26:'Maio'};
const DIAS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let mi=4, ativaTab='acumulado';

function fmt(n){return n==null?null:Math.round(n).toLocaleString('pt-BR');}
function getWD(ds){return new Date(ds+'T12:00:00').getDay();}
function dayNum(ds){return new Date(ds+'T12:00:00').getDate();}
function cc(ds,obs){
  if(obs[ds]) return 'cfer';
  const w=getWD(ds);if(w===0)return'cdom';if(w===6)return'csab';return'';
}
function mkTd(text,cls='',sticky=false){
  const td=document.createElement('td');
  if(sticky)td.className='lbl';
  if(cls)cls.split(' ').filter(Boolean).forEach(c=>td.classList.add(c));
  td.textContent=text??'—';return td;
}
function tab(id,btn){
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');ativaTab=id;renderAtiva();
}
function buildMesBtns(){
  const c=document.getElementById('mbtns');
  MONTHS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='mb'+(i===4?' active':'');b.textContent=MONTH_LBL[m];
    b.onclick=()=>setMes(i);c.appendChild(b);
  });
}
function setMes(i){
  mi=i;
  document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('hbadge').textContent=MONTH_LBL[MONTHS[i]]+' 2026';
  renderAtiva();
}
function renderAtiva(){if(ativaTab==='acumulado')renderAcumulado();else renderPorLinhas();}

function addHeader(table,grupo,dates,obs){
  const trG=document.createElement('tr');trG.className='rg';
  trG.appendChild(mkTd(grupo,'',true));
  dates.forEach(()=>trG.appendChild(mkTd('')));
  trG.appendChild(mkTd('MÊS','ctot'));table.appendChild(trG);
  const trWD=document.createElement('tr');trWD.className='rwd';
  trWD.appendChild(mkTd('DIA','',true));
  dates.forEach(ds=>trWD.appendChild(mkTd(DIAS_PT[getWD(ds)],cc(ds,obs))));
  trWD.appendChild(mkTd('TOTAL','ctot'));table.appendChild(trWD);
  const trDt=document.createElement('tr');trDt.className='rdt';
  trDt.appendChild(mkTd('DATA','',true));
  dates.forEach(ds=>trDt.appendChild(mkTd(String(dayNum(ds)).padStart(2,'0'),cc(ds,obs))));
  trDt.appendChild(mkTd('','ctot'));table.appendChild(trDt);
}

function addDataRows(table,isFull,data,dates,obs){
  if(isFull){
    // Gratuidade
    const trG=document.createElement('tr');trG.className='rd';
    trG.appendChild(mkTd('Gratuidade','',true));
    let s=0;
    dates.forEach((_,i)=>{const v=data.g?.[i]??null;trG.appendChild(mkTd(v!=null?fmt(v):null,cc(dates[i],obs)+(v==null?' cnul':'')));if(v)s+=v;});
    trG.appendChild(mkTd(s>0?fmt(s):null,'ctot'));table.appendChild(trG);
    // Pagantes
    const trP=document.createElement('tr');trP.className='rd';
    trP.appendChild(mkTd('Pag. Pagantes','',true));
    s=0;
    dates.forEach((_,i)=>{const v=data.p?.[i]??null;trP.appendChild(mkTd(v!=null?fmt(v):null,cc(dates[i],obs)+(v==null?' cnul':'')));if(v)s+=v;});
    trP.appendChild(mkTd(s>0?fmt(s):null,'ctot'));table.appendChild(trP);
  }
  // Total
  const trT=document.createElement('tr');trT.className='rd rtot';
  trT.appendChild(mkTd(isFull?'Total':'Passageiros','',true));
  let s=0;
  dates.forEach((_,i)=>{const v=data.t?.[i]??null;trT.appendChild(mkTd(v!=null?fmt(v):null,cc(dates[i],obs)+(v==null?' cnul':'')));if(v)s+=v;});
  trT.appendChild(mkTd(s>0?fmt(s):null,'ctot'));table.appendChild(trT);
  // Viagens (se houver)
  if(data.v && data.v.some(x=>x!=null)){
    const trV=document.createElement('tr');trV.className='rviag';
    trV.appendChild(mkTd('Viagens','',true));
    dates.forEach((_,i)=>{const v=data.v?.[i]??null;trV.appendChild(mkTd(v!=null?fmt(v):null,cc(dates[i],obs)+(v==null?' cnul':'')));});
    trV.appendChild(mkTd(null,'ctot'));table.appendChild(trV);
  }
  // % Grat
  if(isFull){
    const trPct=document.createElement('tr');trPct.className='rpct';
    trPct.appendChild(mkTd('% Gratuidade','',true));
    let tg=0,tp=0;
    dates.forEach((_,i)=>{
      const g=data.g?.[i]||0,p=data.p?.[i]||0,tot=g+p;
      trPct.appendChild(tot>0?mkTd((g/tot*100).toFixed(0)+'%',cc(dates[i],obs)):mkTd(null,'cnul '+cc(dates[i],obs)));
      tg+=g;tp+=p;
    });
    trPct.appendChild(mkTd((tg+tp)>0?(tg/(tg+tp)*100).toFixed(1)+'%':null,'ctot'));
    table.appendChild(trPct);
  }
}

function addObs(table,dates,obs){
  if(!dates.some(ds=>obs[ds])) return;
  const trObs=document.createElement('tr');trObs.className='robs';
  trObs.appendChild(mkTd('OBSERVAÇÕES','',true));
  dates.forEach(ds=>{
    const txt=obs[ds]||'';
    const td=document.createElement('td');
    td.textContent=txt;
    if(txt){
      td.classList.add('o-fer');
      td.addEventListener('mouseenter',function(e){
        var tt=document.getElementById('tt');
        tt.textContent=txt;
        tt.style.display='block';
        tt.style.left=(e.pageX - tt.offsetWidth/2)+'px';
        tt.style.top=(e.pageY - tt.offsetHeight - 14)+'px';
      });
      td.addEventListener('mousemove',function(e){
        var tt=document.getElementById('tt');
        tt.style.left=(e.pageX - tt.offsetWidth/2)+'px';
        tt.style.top=(e.pageY - tt.offsetHeight - 14)+'px';
      });
      td.addEventListener('mouseleave',function(){
        document.getElementById('tt').style.display='none';
      });
    }
    trObs.appendChild(td);
  });
  trObs.appendChild(mkTd('','ctot'));table.appendChild(trObs);
}

function addSep(table,n){
  const tr=document.createElement('tr');tr.className='rsep';
  const td=document.createElement('td');td.colSpan=n+2;tr.appendChild(td);table.appendChild(tr);
}

function renderAcumulado(){
  const sn=MONTHS[mi];const md=D[sn];
  const dates=md.dates;const obs=md.obs||{};
  const out=document.getElementById('cont-acum');out.innerHTML='';
  const st=document.createElement('div');st.className='st';
  st.textContent='Acumulado por Grupo — '+MONTH_LBL[sn]+' 2026';out.appendChild(st);
  GRUPOS.forEach(grupo=>{
    const isFull=GRUPOS_FULL.has(grupo);
    const data=md.acum[grupo];if(!data||!data.t.some(v=>v))return;
    const wrap=document.createElement('div');wrap.className='pw';
    const table=document.createElement('table');
    addHeader(table,grupo,dates,obs);
    addDataRows(table,isFull,data,dates,obs);
    addObs(table,dates,obs);
    addSep(table,dates.length);
    wrap.appendChild(table);out.appendChild(wrap);
  });
}

function renderPorLinhas(){
  const sn=MONTHS[mi];const md=D[sn];
  const dates=md.dates;const obs=md.obs||{};
  const out=document.getElementById('cont-linhas');out.innerHTML='';
  const st=document.createElement('div');st.className='st';
  st.textContent='Por Linha — '+MONTH_LBL[sn]+' 2026';out.appendChild(st);
  GRUPOS.forEach(grupo=>{
    const isFull=GRUPOS_FULL.has(grupo);
    const linhasObj=md.linhas[grupo]||{};
    const linhas=Object.keys(linhasObj);
    if(!linhas.length)return;
    const wrap=document.createElement('div');wrap.className='pw';
    const table=document.createElement('table');
    addHeader(table,grupo,dates,obs);
    linhas.forEach(linha=>{
      const data=linhasObj[linha];
      const trSub=document.createElement('tr');trSub.className='rsub';
      trSub.appendChild(mkTd('Linha '+linha,'',true));
      dates.forEach(()=>trSub.appendChild(mkTd('')));
      trSub.appendChild(mkTd('','ctot'));table.appendChild(trSub);
      addDataRows(table,isFull,data,dates,obs);
    });
    addObs(table,dates,obs);
    addSep(table,dates.length);
    wrap.appendChild(table);out.appendChild(wrap);
  });
}


buildMesBtns();
renderAcumulado();
